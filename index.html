<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management Dashboard</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-[#F8FAFC]">
    <div id="app" class="flex flex-col h-screen font-sans text-slate-900 overflow-hidden">
      <!-- Top Header -->
      <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-indigo-500 rounded flex items-center justify-center font-bold text-white">S</div>
          <h1 class="text-lg font-bold tracking-tight">StudentAdmin.io</h1>
        </div>
        <div class="text-[10px] uppercase tracking-widest text-slate-500 font-semibold hidden md:block">
          Management Dashboard
        </div>
      </header>

      <main class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
        <div id="notification-container" class="fixed top-4 right-4 z-50 flex flex-col items-end"></div>

        <section class="controls-section shrink-0 mb-6">
          <div class="search-filter flex flex-wrap gap-4 items-center">
            <div class="relative w-full md:w-96">
              <input type="text" id="search-input" placeholder="Search by name or email..." class="w-full bg-slate-100 border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all" />
              <span class="absolute left-4 top-2 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              </span>
            </div>
            
            <div class="flex gap-4 ml-auto w-full md:w-auto">
              <select id="department-filter" class="bg-white border border-slate-200 rounded-lg text-xs py-2 px-3 focus:ring-2 focus:ring-indigo-500/20 outline-none flex-1 md:flex-none font-medium">
                <option value="">All Departments</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Engineering">Engineering</option>
                <option value="Business">Business</option>
                <option value="Arts">Arts</option>
              </select>
              <select id="sort-filter" class="bg-white border border-slate-200 rounded-lg text-xs py-2 px-3 focus:ring-2 focus:ring-indigo-500/20 outline-none flex-1 md:flex-none font-medium">
                <option value="">Sort: Default</option>
                <option value="asc">Name (A-Z)</option>
                <option value="desc">Name (Z-A)</option>
              </select>
            </div>
          </div>
        </section>

        <section class="dashboard-grid flex-1 flex flex-col lg:flex-row gap-6 min-h-0 overflow-hidden">
          <div class="form-container bg-white p-6 rounded-2xl border border-slate-200 shadow-sm shrink-0 lg:w-[360px] overflow-y-auto">
            <h2 id="form-title" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Add Student</h2>
            <form id="student-form" novalidate class="space-y-4">
              <input type="hidden" id="student-id" />
              
              <div class="form-group space-y-1.5">
                <label for="name" class="block text-xs font-bold text-slate-700">Name</label>
                <input type="text" id="name" name="name" required minlength="3" placeholder="John Doe" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all" />
                <span class="error-message text-rose-500 text-[10px] font-semibold block empty:hidden" id="name-error"></span>
              </div>

              <div class="form-group space-y-1.5">
                <label for="email" class="block text-xs font-bold text-slate-700">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all" />
                <span class="error-message text-rose-500 text-[10px] font-semibold block empty:hidden" id="email-error"></span>
              </div>

              <div class="form-group space-y-1.5">
                <label for="age" class="block text-xs font-bold text-slate-700">Age</label>
                <input type="number" id="age" name="age" required min="18" max="60" placeholder="22" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all" />
                <span class="error-message text-rose-500 text-[10px] font-semibold block empty:hidden" id="age-error"></span>
              </div>

              <div class="form-group space-y-1.5">
                <label for="department" class="block text-xs font-bold text-slate-700">Department</label>
                <select id="department" name="department" required class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all">
                  <option value="" disabled selected>Select Department</option>
                  <option value="Computer Science">Computer Science</option>
                  <option value="Engineering">Engineering</option>
                  <option value="Business">Business</option>
                  <option value="Arts">Arts</option>
                </select>
                <span class="error-message text-rose-500 text-[10px] font-semibold block empty:hidden" id="department-error"></span>
              </div>

              <div class="form-actions flex gap-3 pt-2">
                <button type="submit" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors flex-1" id="submit-btn">Save Student</button>
                <button type="button" class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors flex-1" id="cancel-btn" style="display: none;">Cancel</button>
              </div>
            </form>
          </div>

          <div class="table-container bg-white border border-slate-200 rounded-2xl flex-1 flex flex-col shadow-sm min-w-0">
            <div class="px-6 py-4 border-b border-slate-100 shrink-0">
               <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Students Directory</h2>
            </div>
            
            <div class="table-responsive flex-1 overflow-auto bg-white">
              <table id="students-table" class="w-full text-left whitespace-nowrap">
                <thead class="bg-slate-50/50 sticky top-0 border-b border-slate-200 z-10 backdrop-blur-sm">
                  <tr class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">
                    <th class="px-6 py-3">Student Name</th>
                    <th class="px-6 py-3">Email Address</th>
                    <th class="px-6 py-3">Age</th>
                    <th class="px-6 py-3">Department</th>
                    <th class="px-6 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="students-table-body" class="text-sm divide-y divide-slate-100">
                  <!-- Student rows will be rendered here -->
                </tbody>
              </table>
            </div>
            <div id="empty-state" class="empty-state p-12 text-center text-slate-400 font-medium hidden">
              <p>No students found matching your criteria.</p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
